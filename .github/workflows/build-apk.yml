name: Build AudioShift Pro APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install npm dependencies
        run: npm install --legacy-peer-deps

      - name: Bundle capacitor-blob-writer into www
        run: |
          mkdir -p www/plugins
          cp node_modules/capacitor-blob-writer/dist/plugin.js www/plugins/blob-writer.js || echo "blob-writer copy failed"

      - name: Add Android platform
        run: npx cap add android

      - name: List generated Android Kotlin/Java files
        run: |
          echo "=== All .kt files ==="
          find android -name "*.kt" 2>/dev/null || echo "none"
          echo "=== All .java files ==="
          find android -name "*.java" 2>/dev/null || echo "none"
          echo "=== MainActivity search ==="
          find android -name "MainActivity*" 2>/dev/null || echo "none"

      - name: Configure Android build settings
        run: |
          sed -i 's/minSdkVersion = .*/minSdkVersion = 24/' android/variables.gradle
          sed -i 's/<application/<application android:largeHeap="true"/' android/app/src/main/AndroidManifest.xml
          sed -i 's/android:label="@string\/app_name"/android:label="@string\/app_name" android:hardwareAccelerated="true"/' android/app/src/main/AndroidManifest.xml

      - name: Add Android permissions
        run: |
          sed -i 's|</manifest>|    <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" />\n    <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE" android:maxSdkVersion="28" />\n    <uses-permission android:name="android.permission.READ_MEDIA_AUDIO" />\n    <uses-permission android:name="android.permission.MANAGE_EXTERNAL_STORAGE" />\n    <uses-permission android:name="android.permission.INTERNET" />\n    <uses-permission android:name="android.permission.WAKE_LOCK" />\n    <uses-permission android:name="android.permission.POST_NOTIFICATIONS" />\n    <uses-permission android:name="android.permission.FOREGROUND_SERVICE" />\n    <uses-permission android:name="android.permission.FOREGROUND_SERVICE_DATA_SYNC" />\n</manifest>|' android/app/src/main/AndroidManifest.xml

      - name: Register ForegroundService in AndroidManifest
        run: |
          sed -i 's|</application>|    <service\n        android:name="io.capawesome.capacitorjs.plugins.foregroundservice.AndroidForegroundService"\n        android:foregroundServiceType="dataSync"\n        android:exported="false" />\n    </application>|' android/app/src/main/AndroidManifest.xml

      - name: Add ffmpeg-kit community fork dependency
        run: |
          # ffmpeg-kit retired Apr 2025 — use community fork on Maven Central
          # com.moizhassan.ffmpeg:ffmpeg-kit-16kb is actively maintained and API-compatible
          sed -i '/dependencies {/a\    implementation("com.moizhassan.ffmpeg:ffmpeg-kit-16kb:6.1.1")' android/app/build.gradle
          echo "=== Added ffmpeg-kit dependency ==="
          grep "ffmpeg\|moizhassan" android/app/build.gradle || true

      - name: Copy FFmpegPlugin.kt into Android project
        run: |
          # Just verify source file exists — actual copy happens after MainActivity is found
          ls -la android-src/FFmpegPlugin/FFmpegPlugin.kt && echo "✅ Source FFmpegPlugin.kt ready"

      - name: Register FFmpegPlugin in MainActivity
        run: |
          # Find MainActivity — could be .java or .kt depending on Capacitor version
          MAIN=$(find android/app/src/main/java -name "MainActivity.java" -o -name "MainActivity.kt" 2>/dev/null | head -1)
          echo "✅ Found: $MAIN"
          MAIN_DIR=$(dirname "$MAIN")
          echo "📁 Dir: $MAIN_DIR"

          # Copy FFmpegPlugin.kt to same directory
          cp android-src/FFmpegPlugin/FFmpegPlugin.kt "$MAIN_DIR/"
          echo "✅ FFmpegPlugin.kt copied to $MAIN_DIR"

          # Get package name
          PKG=$(grep "^package" "$MAIN" | awk '{print $2}' | tr -d ';')
          echo "📦 Package: $PKG"

          if [[ "$MAIN" == *.java ]]; then
            echo "--- Patching Java MainActivity ---"
            # Add import after package line
            grep -q "FFmpegPlugin" "$MAIN" || sed -i "/^package /a import ${PKG}.FFmpegPlugin;" "$MAIN"
            # Add registerPlugin call inside onCreate
            if ! grep -q "registerPlugin(FFmpegPlugin" "$MAIN"; then
              sed -i 's|super.onCreate(savedInstanceState);|registerPlugin(FFmpegPlugin.class);\n        super.onCreate(savedInstanceState);|' "$MAIN"
            fi
          else
            echo "--- Patching Kotlin MainActivity ---"
            grep -q "FFmpegPlugin" "$MAIN" || sed -i "/^package /a import ${PKG}.FFmpegPlugin" "$MAIN"
            if ! grep -q "registerPlugin(FFmpegPlugin" "$MAIN"; then
              sed -i 's|class MainActivity : BridgeActivity() {|class MainActivity : BridgeActivity() {\n  override fun onCreate(savedInstanceState: android.os.Bundle?) {\n    registerPlugin(FFmpegPlugin::class.java)\n    super.onCreate(savedInstanceState)\n  }|' "$MAIN"
            fi
          fi

          echo "=== MainActivity after patch ==="
          cat "$MAIN"


      - name: Sync Capacitor
        run: npx cap sync android

      - name: Verify index.html bundled correctly
        run: |
          BUNDLED="android/app/src/main/assets/public/index.html"
          echo "=== Checking bundled index.html ==="
          grep -n "registerPlugin\|FFmpegConverter\|_FFmpeg" "$BUNDLED" | head -10 || echo "❌ No FFmpeg lines found in bundled file"
          wc -l "$BUNDLED"

      - name: Make Gradle wrapper executable
        run: chmod +x android/gradlew

      - name: Restrict ABI to arm64-v8a (reduce APK size under 50MB)
        run: |
          # Use Gradle DSL append — most reliable across all Capacitor-generated build.gradle formats
          echo '' >> android/app/build.gradle
          echo 'android.defaultConfig.ndk.abiFilters = ["arm64-v8a"]' >> android/app/build.gradle
          echo "✅ abiFilters appended"
          grep "abiFilters" android/app/build.gradle || echo "⚠️ not found"

      - name: Build Debug APK
        run: |
          cd android
          ./gradlew assembleDebug --no-daemon --stacktrace

      - name: APK info
        run: |
          APK="android/app/build/outputs/apk/debug/app-debug.apk"
          [ -f "$APK" ] && echo "✅ $(du -sh $APK)" || { echo "❌ APK not found"; exit 1; }

      - name: Publish to GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "AudioShift Pro — Build #${{ github.run_number }}"
          files: android/app/build/outputs/apk/debug/app-debug.apk
          body: |
            🎵 **AudioShift Pro — Latest Build**

            📦 Build: #${{ github.run_number }}
            📅 Date: ${{ github.event.head_commit.timestamp }}
            💬 Change: ${{ github.event.head_commit.message }}

            **Install:**
            1. Download `app-debug.apk` below
            2. Tap the file on your phone
            3. Install
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Send APK to Telegram
        if: success()
        continue-on-error: true
        run: |
          APK="android/app/build/outputs/apk/debug/app-debug.apk"
          APK_SIZE=$(du -sh "$APK" | cut -f1)
          echo "APK size: $APK_SIZE"
          COMMIT_MSG="${{ github.event.head_commit.message }}"
          BUILD_NUM="${{ github.run_number }}"
          DATE=$(date '+%d %b %Y %H:%M UTC')
          # Check size — Telegram bot limit is 50MB
          SIZE_BYTES=$(stat -c%s "$APK")
          if [ "$SIZE_BYTES" -gt 52428800 ]; then
            echo "⚠️ APK too large for Telegram (${APK_SIZE}), sending download link instead"
            curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
              -F chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
              -F text="🎵 AudioShift Pro — Build #${BUILD_NUM}
          📅 ${DATE}
          📦 Size: ${APK_SIZE} (too large for Telegram)
          💬 ${COMMIT_MSG}

          📥 Download: https://github.com/${{ github.repository }}/releases/latest/download/app-debug.apk"
          else
            curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendDocument" \
              -F chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
              -F document=@"$APK" \
              -F caption="🎵 AudioShift Pro — Build #${BUILD_NUM}
          📅 ${DATE}
          📦 Size: ${APK_SIZE}
          💬 ${COMMIT_MSG}

          Tap the file above to install." \
              --max-time 120
          fi
