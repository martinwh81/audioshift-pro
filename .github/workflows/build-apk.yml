name: Build AudioShift Pro APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:  # allows manual trigger from GitHub UI

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # 1. Checkout code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' 

      # 3. Setup Java (required for Android build)
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # 4. Setup Android SDK
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # 5. Install Capacitor dependencies
      - name: Install npm dependencies
        run: npm install

      # 6. Add Android platform
      - name: Add Android platform
        run: npx cap add android

      # 7. Apply Android optimizations
      - name: Configure Android build settings
        run: |
          # Set minSdkVersion to 24 (Android 7) for WebCodecs support
          sed -i 's/minSdkVersion = .*/minSdkVersion = 24/' android/variables.gradle
          # Enable large heap for audio processing
          sed -i 's/<application/<application android:largeHeap="true"/' android/app/src/main/AndroidManifest.xml
          # Enable hardware acceleration
          sed -i 's/android:label="@string\/app_name"/android:label="@string\/app_name" android:hardwareAccelerated="true"/' android/app/src/main/AndroidManifest.xml
          echo "Android config applied"

      # 8. Add required permissions to AndroidManifest
      - name: Add Android permissions
        run: |
          # Add permissions before </manifest>
          sed -i 's|</manifest>|    <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" />\n    <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE" android:maxSdkVersion="28" />\n    <uses-permission android:name="android.permission.READ_MEDIA_AUDIO" />\n    <uses-permission android:name="android.permission.INTERNET" />\n    <uses-permission android:name="android.permission.WAKE_LOCK" />\n</manifest>|' android/app/src/main/AndroidManifest.xml
          echo "Permissions added"

      # 9. Sync web files to Android
      - name: Sync Capacitor
        run: npx cap sync android

      # 10. Make gradlew executable
      - name: Make Gradle wrapper executable
        run: chmod +x android/gradlew

      # 11. Build debug APK
      - name: Build Debug APK
        run: |
          cd android
          ./gradlew assembleDebug --no-daemon --stacktrace
        env:
          JAVA_HOME: ${{ env.JAVA_HOME }}

      # 12. Upload APK as artifact (downloadable from GitHub)
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: AudioShift-Pro-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      # 13. Show APK info
      - name: APK build info
        run: |
          APK_PATH="android/app/build/outputs/apk/debug/app-debug.apk"
          if [ -f "$APK_PATH" ]; then
            SIZE=$(du -sh "$APK_PATH" | cut -f1)
            echo "✅ APK built successfully!"
            echo "📦 Size: $SIZE"
            echo "📍 Location: $APK_PATH"
          else
            echo "❌ APK not found"
            exit 1
          fi
